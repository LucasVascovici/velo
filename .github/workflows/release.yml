name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Verify that Cargo.toml version matches the pushed tag ──────────────────
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml version matches tag
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Cargo.toml ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✔ Version $CARGO_VERSION matches tag"

  # ── Build and publish binaries for every supported platform ───────────────
  build:
    name: Build · ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86-64 (static musl binary) ─────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: velo
            package: velo-x86_64-linux.tar.gz
            musl_cc: musl-gcc
            apt_packages: musl-tools

          # ── Linux ARM64 (static musl binary) ──────────────────────────────
          # Uses the native ARM64 runner — no cross-compilation needed, no
          # Docker, no separate toolchain.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: velo
            package: velo-aarch64-linux.tar.gz
            musl_cc: musl-gcc
            apt_packages: musl-tools

          # ── macOS Apple Silicon (native runner) ───────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: velo
            package: velo-aarch64-macos.tar.gz

          # ── macOS Intel (cross-compiled from the Apple Silicon runner) ────
          # Apple's own Clang ships both targets; no extra toolchain needed.
          # macos-13 was retired in 2026 — cross-compile instead.
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: velo
            package: velo-x86_64-macos.tar.gz

          # ── Windows x86-64 ────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: velo.exe
            package: velo-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux system packages
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt_packages }}

      # Set the C compiler for musl targets via $GITHUB_ENV so it is available
      # to all subsequent steps.  This is necessary because rusqlite's bundled
      # SQLite is compiled by cc-rs, which reads the CC environment variable.
      # The broken dynamic-key trick (${{ matrix.cc_env }}: '') does NOT work
      # in GitHub Actions — env map keys cannot be expressions.
      - name: Set CC for musl targets (Linux)
        if: matrix.musl_cc != ''
        run: echo "CC=${{ matrix.musl_cc }}" >> $GITHUB_ENV

      # Tests are run in debug mode (fast compile) before producing the release
      # binary.  --locked ensures exact dep versions from Cargo.lock.
      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          test -f "$BINARY" || (echo "Binary not found at $BINARY" && exit 1)
          tar -czf "${{ matrix.package }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          if (-not (Test-Path $binary)) { throw "Binary not found: $binary" }
          Compress-Archive -Path $binary -DestinationPath "${{ matrix.package }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}