name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Verify that Cargo.toml version matches the pushed tag ──────────────────
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml version matches tag
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✔ Version $CARGO_VERSION matches tag"

  # ── Build and publish binaries for every supported platform ───────────────
  build:
    name: Build · ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 (static musl binary — runs on any Linux without glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: velo
            package: velo-x86_64-linux.tar.gz
            extra_packages: musl-tools
            cc_env: CC_x86_64_unknown_linux_musl=musl-gcc

          # Linux ARM64 (AWS Graviton, Raspberry Pi 4+, etc.)
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: velo
            package: velo-aarch64-linux.tar.gz
            extra_packages: musl-tools gcc-aarch64-linux-gnu
            cc_env: CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: velo
            package: velo-x86_64-macos.tar.gz

          # macOS Apple Silicon (M1/M2/M3 — native runner)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: velo
            package: velo-aarch64-macos.tar.gz

          # Windows x86-64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: velo.exe
            package: velo-x86_64-windows.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux system packages
        if: matrix.extra_packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.extra_packages }}

      # Run the test suite before producing the release binary.
      # Tests are compiled in debug mode (fast) — the release binary is built
      # separately below.  --locked ensures exact dep versions from Cargo.lock.
      - name: Run tests
        run: cargo test --locked
        env:
          ${{ matrix.cc_env || 'DUMMY' }}: ''

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          ${{ matrix.cc_env || 'DUMMY' }}: ''

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          test -f "$BINARY" || (echo "Binary not found: $BINARY" && exit 1)
          tar -czf "${{ matrix.package }}" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          if (-not (Test-Path $binary)) { throw "Binary not found: $binary" }
          Compress-Archive -Path $binary -DestinationPath "${{ matrix.package }}"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}