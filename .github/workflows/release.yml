name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: velo
            asset_name: velo-x86_64-unknown-linux-musl.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: velo
            asset_name: velo-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: velo.exe
            asset_name: velo-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.asset_name }} -C target/${{ matrix.target }}/release ${{ matrix.artifact_name }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: compress-archive target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
